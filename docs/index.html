<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohican | 链接页</title>
    <meta name="description" content="769600627 - 个人链接页">
    <meta property="og:title" content="Mohican | 链接页">
    <meta property="og:description" content="769600627 - 个人链接页">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.769600627.xyz">
    <meta property="og:locale" content="zh_CN">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --accent-1: #6c5ce7;
            --accent-2: #00cec9;
            --accent-3: #fd79a8;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --glass-bg: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
        }
        html { scroll-behavior: smooth; background: var(--bg-primary); }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            overflow-x: hidden; line-height: 1.6; min-height: 100vh;
        }
        #particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .spotlight {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 1;
            background: radial-gradient(600px circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(108,92,231,0.08), transparent 80%);
        }
        .hero {
            position: relative; z-index: 2;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
        }
        .hero-content { max-width: 600px; width: 100%; }
        .hero-badge {
            display: inline-block; padding: 0.4rem 1.2rem; border-radius: 50px;
            font-size: 0.8rem; font-weight: 600;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--accent-2); margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease forwards; opacity: 0;
        }
        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900;
            line-height: 1.1; margin-bottom: 0.5rem; letter-spacing: -2px;
        }
        .gradient-text {
            background: linear-gradient(to right, var(--accent-1), var(--accent-2), var(--accent-3), var(--accent-1));
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        .typewriter {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: var(--text-secondary); margin-bottom: 2.5rem; min-height: 2em;
        }
        .typewriter .cursor {
            display: inline-block; width: 2px; height: 1.2em;
            background: var(--accent-2); margin-left: 2px;
            animation: blink 0.8s step-end infinite; vertical-align: text-bottom;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .link-grid { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
        .link-card {
            display: flex; align-items: center; gap: 1rem;
            padding: 1.2rem 1.5rem; background: var(--glass-bg);
            border: 1px solid var(--glass-border); border-radius: 14px;
            text-decoration: none; color: var(--text-primary);
            transition: all 0.3s ease; backdrop-filter: blur(12px);
        }
        .link-card:hover {
            transform: translateY(-3px); border-color: var(--accent-1);
            box-shadow: 0 8px 30px rgba(108,92,231,0.2);
            background: rgba(108,92,231,0.06);
        }
        .link-card-icon { font-size: 2rem; flex-shrink: 0; width: 48px; text-align: center; }
        .link-card-text { flex: 1; text-align: left; }
        .link-card-text strong { display: block; font-size: 1rem; margin-bottom: 2px; }
        .link-card-text span { display: block; font-size: 0.8rem; color: var(--text-secondary); }
        .link-card-arrow {
            font-size: 1.2rem; color: var(--text-secondary);
            transition: transform 0.3s ease, color 0.3s ease; flex-shrink: 0;
        }
        .link-card:hover .link-card-arrow { transform: translateX(4px); color: var(--accent-2); }
        .scroll-indicator {
            position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
            animation: bounce 2s ease infinite; opacity: 0.5;
        }
        .scroll-indicator span {
            display: block; width: 24px; height: 38px;
            border-radius: 12px; border: 2px solid var(--text-secondary); position: relative;
        }
        .scroll-indicator span::after {
            content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 8px; border-radius: 2px; background: var(--accent-2);
            animation: scrollDot 2s ease infinite;
        }
        @keyframes bounce { 0%,20%,50%,80%,100% { transform: translateX(-50%) translateY(0); } 40% { transform: translateX(-50%) translateY(-10px); } 60% { transform: translateX(-50%) translateY(-5px); } }
        @keyframes scrollDot { 0% { opacity: 1; top: 6px; } 100% { opacity: 0; top: 20px; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        footer {
            position: relative; z-index: 2; text-align: center; padding: 2rem;
            border-top: 1px solid var(--glass-border);
            color: var(--text-secondary); font-size: 0.85rem;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-1); border-radius: 4px; }
        @media (max-width: 480px) {
            .hero { padding: 1.5rem; }
            .link-card { padding: 1rem 1.2rem; }
            .link-card-icon { font-size: 1.5rem; width: 40px; }
        }
    </style>
</head>
<body>
    <div class="spotlight" id="spotlight"></div>
    <canvas id="particles"></canvas>

    <section class="hero">
        <div class="hero-content">
            <span class="hero-badge">👋 欢迎来到我的链接页</span>
            <h1><span class="gradient-text">Mohican</span></h1>
            <div class="typewriter"><span id="typewriter-text"></span><span class="cursor"></span></div>
            <div class="link-grid" id="links-container"></div>
        </div>
        <div class="scroll-indicator"><span></span></div>
    </section>

    <footer>
        <p>&copy; 2026 Mohican. Made with ❤️</p>
    </footer>

    <script>
        // Particle background
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (mouse.x !== null) {
                    const dx = mouse.x - this.x, dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        const force = (120 - dist) / 120;
                        this.x -= (dx / dist) * force * 1.5;
                        this.y -= (dy / dist) * force * 1.5;
                    }
                }
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(108, 92, 231, ' + this.opacity + ')';
                ctx.fill();
            }
        }

        const particleCount = Math.min(120, Math.floor((canvas.width * canvas.height) / 12000));
        for (let i = 0; i < particleCount; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Spotlight
        document.addEventListener('mousemove', e => {
            document.getElementById('spotlight').style.setProperty('--mouse-x', e.clientX + 'px');
            document.getElementById('spotlight').style.setProperty('--mouse-y', e.clientY + 'px');
        });

        // Typewriter effect
        const phrases = ['开发者 🚀', '折腾爱好者 ⚡', '开源贡献者 💡', '自建派 🏠'];
        let phraseIndex = 0, charIndex = 0, isDeleting = false;
        const tw = document.getElementById('typewriter-text');

        function typeWriter() {
            const current = phrases[phraseIndex];
            if (isDeleting) {
                tw.textContent = current.substring(0, charIndex - 1);
                charIndex--;
            } else {
                tw.textContent = current.substring(0, charIndex + 1);
                charIndex++;
            }
            let speed = isDeleting ? 40 : 80;
            if (!isDeleting && charIndex === current.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; phraseIndex = (phraseIndex + 1) % phrases.length; speed = 500; }
            setTimeout(typeWriter, speed);
        }
        typeWriter();

        // Links - EDIT THESE TO YOUR OWN
        const links = [
            { icon: '🐙', title: 'GitHub', desc: '我的开源项目', url: 'https://github.com/769600627' },
            { icon: '🐦', title: 'Twitter / X', desc: '日常动态', url: 'https://x.com/769600627' },
            { icon: '📧', title: 'Email', desc: '联系我', url: 'mailto:769600627@example.com' },
            { icon: '📝', title: '博客', desc: '技术文章与思考', url: 'https://www.769600627.xyz' },
        ];

        const container = document.getElementById('links-container');
        links.forEach(link => {
            const a = document.createElement('a');
            a.href = link.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.className = 'link-card';
            a.innerHTML = '<span class="link-card-icon">' + link.icon + '</span><div class="link-card-text"><strong>' + link.title + '</strong><span>' + link.desc + '</span></div><span class="link-card-arrow">&rarr;</span>';
            container.appendChild(a);
        });
    </script>
</body>
</html>
